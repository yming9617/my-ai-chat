<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI助手验证</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f7fa;font-family:system-ui;padding:40px 20px;}
.login{max-width:380px;margin:0 auto;background:#fff;border-radius:16px;padding:32px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
h2{text-align:center;color:#1f2937;margin-bottom:24px;font-size:20px;}
input{width:100%;height:48px;border:1px solid #e5e7eb;border-radius:10px;padding:0 16px;margin-bottom:16px;font-size:16px;}
button{width:100%;height:48px;background:#07c160;color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:500;}
.tip{text-align:center;color:#6b7280;margin-top:16px;font-size:14px;}
/* 关键：iframe全屏 */
.chat{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:none;}
iframe{width:100%;height:100%;border:none;}
</style>
</head>
<body>

<div class="login" id="login">
  <h2>专属访问验证</h2>
  <input type="text" id="nick" placeholder="你的微信昵称">
  <input type="text" id="pwd" placeholder="访问密码">
  <button onclick="go()">验证进入</button>
  <div class="tip">昵称+密码均由管理员提供</div>
</div>

<div class="chat" id="chat">
  <iframe id="ai"></iframe>
</div>

<script>
// 你只需要改这里 👇
const PWD = '114207'; // 你的密码
const WHITE_LIST = ['张三','李四','你的昵称']; // 白名单
const AI_URL = 'https://你的真实AI地址'; // 必须HTTPS！
// 你只需要改这里 👆

function go(){
  let nick = document.getElementById('nick').value.trim();
  let pwd = document.getElementById('pwd').value.trim();

  if(WHITE_LIST.includes(nick) && pwd === PWD){
    // 验证成功：显示iframe
    document.getElementById('login').style.display = 'none';
    document.getElementById('chat').style.display = 'block';
    // 关键：延迟加载iframe（微信兼容）
    setTimeout(()=>{
      document.getElementById('ai').src = AI_URL;
    }, 200);
  }else{
    alert('昵称或密码错误');
  }
}
</script>
</body>
</html>
