<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄玄助手-家庭版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 25px; color: #1a1a1a; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
        .chat-box { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="login-box" id="login">
        <h2>🔒 玄玄助手</h2>
        <input type="password" id="pwd" placeholder="请输入访问密码">
        <button onclick="check()">进入聊天</button>
    </div>

    <div class="chat-box" id="chat">
        <!-- 这里直接用你Dify的公开嵌入地址，不用localhost！ -->
        <iframe src="https://www.doubao.com/ai/app-JxRBjEKa9RU85W2qVCf8PZul" allow="microphone"></iframe>
    </div>

    <script>
        function check() {
            const pwd = document.getElementById('pwd').value;
            if (pwd === '114207') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('chat').style.display = 'block';
            } else {
                alert('密码错误，请重试');
            }
        }
    </script>
</body>
</html>
