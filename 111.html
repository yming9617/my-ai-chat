<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授权登录系统</title>
<style>
body{background:#f5f7fa;font-family:微软雅黑;padding:30px 20px;margin:0;}
.box{max-width:360px;margin:80px auto;background:#fff;padding:35px;border-radius:18px;}
h2{text-align:center;margin:0 0 25px 0;color:#222;}
input{width:100%;height:50px;border:1px solid #eee;border-radius:10px;padding:0 15px;font-size:16px;margin-bottom:20px;}
button{width:100%;height:50px;background:#07c160;color:#fff;border:none;border-radius:10px;font-size:17px;}
.tip{text-align:center;margin-top:20px;font-size:13px;color:#999;}
.wait{color:#07c160;text-align:center;display:none;}
</style>
</head>
<body>
<div class="box">
    <h2>身份验证</h2>
    <input type="password" id="pwd" placeholder="请输入登录密码">
    <button onclick="checkPwd()">提交</button>
    <div class="tip">普通用户等待管理员放行</div>
    <div class="wait" id="waitTxt">✅ 已授权，正在进入...</div>
</div>

<script>
// 配置：自己改这里
const userPwd = "114207";     // 同学用的普通密码
const adminPwd = "889966";    // 你管理员专属授权密码
const jumpUrl = "https://109c033903d90c1f-60-20-253-159.serveousercontent.com/chat/DjjodCnbywxurDGW";

// 用本地缓存做授权标记
function checkPwd(){
    let p = document.getElementById("pwd").value.trim();
    if(p === userPwd){
        // 普通用户：等待授权
        alert("已提交，请等待管理员授权");
        waitAccess();
    }else if(p === adminPwd){
        // 管理员：一键放行
        localStorage.setItem("allow","yes");
        alert("授权成功，对方已可以进入");
        location.reload();
    }else{
        alert("密码错误");
    }
}

// 轮询等待授权
function waitAccess(){
    let t = setInterval(()=>{
        if(localStorage.getItem("allow") === "yes"){
            clearInterval(t);
            document.getElementById("waitTxt").style.display = "block";
            setTimeout(()=>{
                window.open(jumpUrl,"_blank");
                // 授权用完清空，下次重新审批
                localStorage.removeItem("allow");
            },800);
        }
    },1000);
}
</script>
</body>
</html>
