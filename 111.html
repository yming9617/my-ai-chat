<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>

.login-box{max-width:360px;margin:80px auto;background:#fff;padding:35px;border-radius:18px;box-shadow:0 4px 20px rgba(0,0,0.08);}

input{width:100%;height:50px;border:1px solid #e5e5e5;border-radius:10px;padding:0 15px;font-size:16px;margin-bottom:20px;}
button{width:100%;height:50px;background:#07c160;color:#fff;border:none;border-radius:10px;font-size:17px;}
.tip{text-align:center;margin-top:20px;font-size:13px;color:#999;line-height:1.6;}

</head>
<body>

</div>
