<!DOCTYPE html>

<head>

<style>

    h2{text-align:center; margin-bottom:25px; color:#333;}
    input{width:100%; height:46px; border:1px solid #ddd; border-radius:8px; padding:0 15px; margin-bottom:15px; font-size:15px;}
    button{width:100%; height:48px; background:#07c160; color:#fff; border:none; border-radius:8px; font-size:16px;}
    .tip{text-align:center; margin-top:15px; font-size:13px; color:#999;}

</div>

</html>
