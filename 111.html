<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专属AI助手</title>
<style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#f6f7f9;padding:30px 20px;font-family:system-ui;}
    .box{max-width:380px;margin:70px auto;background:#fff;padding:30px;border-radius:18px;box-shadow:0 4px 20px rgba(0,0,0,0.06);}
    h2{text-align:center;margin-bottom:25px;color:#222;}
    input{width:100%;height:48px;border:1px solid #e1e4e7;border-radius:10px;padding:0 16px;margin-bottom:16px;font-size:15px;}
    button{width:100%;height:48px;background:#07c160;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:500;}
    .tip{text-align:center;margin-top:18px;font-size:13px;color:#999;}
</style>
</head>

<body>
<div class="box" id="box">
    <h2>专属访问验证</h2>
    <input type="text" id="code" placeholder="请输入6位一次性验证码">
    <button onclick="check()">验证进入</button>
    <div class="tip">验证码需从公众号获取<br>仅限授权用户使用</div>
</div>

<script>
// ================== 安全配置 ==================
const APPID        = "wx65561ece0824b058";
const AI_URL       = "http://localhost/chat/DjjodCnbywxurDGW";
const WHITE_LIST   = []; // 白名单OpenID，以后加
const VALID_CODES  = new Set(); // 动态验证码
// ===============================================

async function check(){
    const code = document.getElementById("code").value.trim();
    if(!VALID_CODES.has(code)){
        alert("验证码无效或已过期");
        return;
    }
    VALID_CODES.delete(code);
    window.open(AI_URL, "_blank");
}

// 生成动态验证码（你后台调用）
function generateCode(){
    const code = Math.floor(100000 + Math.random()*900000).toString();
    VALID_CODES.add(code);
    setTimeout(()=>VALID_CODES.delete(code), 5*60*1000);
    return code;
}
</script>
</body>
