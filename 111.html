<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭WiFi专用登录</title>
<style>
body{background:#f5f7fa;padding:30px 20px;margin:0;font-family:微软雅黑;}
.box{max-width:360px;margin:80px auto;background:#fff;padding:35px;border-radius:18px;}
h2{text-align:center;margin:0 0 25px 0;}
input{width:100%;height:50px;border:1px solid #eee;border-radius:10px;padding:0 15px;font-size:16px;margin-bottom:20px;box-sizing:border-box;}
button{width:100%;height:50px;background:#07c160;color:#fff;border:none;border-radius:10px;font-size:17px;}
.tip{text-align:center;margin-top:15px;font-size:13px;color:#666;}
</style>
</head>
<body>
<div class="box">
    <h2>家庭WiFi专用</h2>
    <input type="password" id="pwd" placeholder="请输入登录密码">
    <button onclick="login()">登录进入</button>
    <div class="tip">仅家庭WiFi内使用</div>
</div>

<script>
// 已根据你的IP和端口配置好
const AI_URL = "http://192.168.1.104:11434";
const PASSWORD = "114207";

function login() {
    let val = document.getElementById("pwd").value.trim();
    if (val === PASSWORD) {
        window.open(AI_URL, "_blank");
    } else {
        alert("密码错误");
    }
}
</script>
</body>
</html>
