<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>专属AI助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f6f8;font-family:"微软雅黑",sans-serif;}
.login-box{width:85%;max-width:420px;margin:120px auto;background:#fff;border-radius:16px;padding:35px 25px;box-shadow:0 2px 15px #eee;}
h2{text-align:center;color:#333;margin-bottom:30px;font-size:20px;}
input{width:100%;height:48px;padding:0 15px;border:1px solid #ddd;border-radius:8px;font-size:16px;outline:none;}
button{width:100%;height:48px;background:#07c160;color:#fff;border:none;border-radius:8px;font-size:17px;margin-top:20px;}
.iframe-wrap{position:fixed;top:0;left:0;width:100%;height:100vh;display:none;}
iframe{width:100%;height:100%;border:none;}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h2>专属访问验证</h2>
  <input type="text" id="pwdInput" placeholder="请输入访问密码">
  <button onclick="checkPwd()">验证进入</button>
</div>

<div class="iframe-wrap" id="chatWrap">
  <iframe id="aiFrame" src="http://localhost/chat/DjjodCnbywxurDGW"></iframe>
</div>

<script>
const RIGHT_PWD = "114207";
function checkPwd(){
  let pwd = document.getElementById("pwdInput").value.trim();
  if(pwd === RIGHT_PWD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chatWrap").style.display = "block";
  }else{
    alert("密码错误，请联系管理员获取正确密码");
  }
}
</script>

</body>
</html>
